version: 2.1
orbs:
  slack: circleci/slack@4.1
executors:
  golang-executor:
    docker:
      - image: gcr.io/gcr-for-testing/golang:1.25.10
    resource_class: arangodb/medium-amd64

  x86-docker-executor:
    docker:
      - image: gcr.io/gcr-for-testing/golang:1.25.10
    resource_class: arangodb/medium-amd64-privileged

  arm-docker-executor:
    docker:
      - image: gcr.io/gcr-for-testing/golang:1.25.10
    resource_class: arangodb/medium-arm64-privileged
aliases:
  - &notify_slack_on_fail
    slack/notify:
      channel: 'C056RL4BXG9' #status-go channel
      event: fail
      template: basic_fail_1
  # Make targets allowed for pipeline parameter publish (keep in sync with Makefile release / prerelease targets).
  - &publish_release_target_regex '^(release-patch|release-minor|release-major|release-v2-patch|release-v2-minor|release-v2-major|release-v3-patch|release-v3-minor|release-v3-major|prerelease-patch|prerelease-minor|prerelease-major|prerelease-v2-patch|prerelease-v2-minor|prerelease-v2-major|prerelease-v3-patch|prerelease-v3-minor|prerelease-v3-major)$'

  # Common environment for integration tests (x86 and ARM). Foxx demo zip path is optional:
  # v1/v2 jobs set needs_foxx_workspace and export TEST_RESOURCES=/home/circleci/resources/ after attach_workspace at /home/circleci.
  - &integration_test_env_core
    GOIMAGE: << pipeline.parameters.goImage >>
    ALPINE_IMAGE: << pipeline.parameters.alpineImage >>
    STARTER: << pipeline.parameters.starterImage >>
    ENABLE_DATABASE_EXTRA_FEATURES: << parameters.enable-extra-db-features >>
    ENABLE_VECTOR_INDEX: "true"
    TEST_DISALLOW_UNKNOWN_FIELDS: false
    VERBOSE: 1

parameters:
  goImage:
    type: string
    default: "gcr.io/gcr-for-testing/golang:1.25.10"
  arangodbImageV2:
    type: string
    default: "gcr.io/gcr-for-testing/arangodb/enterprise-preview:latest"
  arangodbImageV3:
    type: string
    default: "gcr.io/gcr-for-testing/arangodb/enterprise-preview:4.0-nightly"
  alpineImage:
    type: string
    default: "gcr.io/gcr-for-testing/alpine:3.23"
  starterImage:
    type: string
    default: "arangodb/arangodb-starter:0.20.0-preview-9"
  # Empty by default. Set via "Trigger Pipeline" / API to a release Make target (see publish-release workflow).
  # Same pattern as arangodb-helper/arangodb: e.g. release-v2-patch, prerelease-v2-minor.
  publish:
    type: string
    default: ""

commands:
  setup-docker:
    description: "Install Docker and start the daemon in the job container"
    steps:
      - run:
          name: Set up Docker
          command: |
            if ! command -v docker >/dev/null 2>&1; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y docker.io
            fi
            if ! docker info >/dev/null 2>&1; then
              dockerd >/tmp/dockerd.log 2>&1 &
              for i in $(seq 1 30); do
                docker info >/dev/null 2>&1 && break
                sleep 1
              done
            fi
            docker info
            if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
              echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin
            else
              echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set; Docker Hub pulls remain anonymous."
            fi

  run-test-if-pr:
    description: "Run a test command only if this is a pull request"
    parameters:
      test-command:
        type: string
    steps:
      - run:
          name: Run integration tests
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
            << parameters.test-command >>

  install-kubernetes-tools:
    description: "Install kubectl and kind for Kubernetes integration tests"
    steps:
      - run:
          name: Install kubectl and kind
          command: |
            set -euo pipefail
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping Kubernetes tool install..."
              exit 0
            fi
            apt-get update
            apt-get install -y conntrack socat openssl

            curl -fsSL -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION:-v1.31.12}/bin/linux/amd64/kubectl"
            install kubectl /usr/local/bin/kubectl

            curl -fsSL -o kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION:-v0.30.0}/kind-linux-amd64"
            install kind /usr/local/bin/kind

            kubectl version --client=true
            kind version

  start-kind:
    description: "Start a local kind Kubernetes cluster for integration tests"
    steps:
      - run:
          name: Start kind
          command: |
            set -euo pipefail
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping kind startup..."
              exit 0
            fi
            dump_kind_diagnostics() {
              echo "=== docker info ==="
              docker info || true
              echo "=== docker ps -a ==="
              docker ps -a || true
              echo "=== kind clusters ==="
              kind get clusters || true
              echo "=== kind logs ==="
              kind export logs /tmp/kind-logs --name "${KIND_CLUSTER_NAME:-arangodb-driver-tests}" || true
              if [ -d /tmp/kind-logs ]; then
                find /tmp/kind-logs -maxdepth 3 -type f -print -exec sh -c 'echo "=== $1 ==="; tail -n 200 "$1"' sh {} \; || true
              fi
              echo "=== control-plane docker logs ==="
              docker logs "${KIND_CLUSTER_NAME:-arangodb-driver-tests}-control-plane" || true
            }
            trap dump_kind_diagnostics ERR
            cat \<<EOF | kind create cluster --retain --name "${KIND_CLUSTER_NAME:-arangodb-driver-tests}" --image "${KIND_NODE_IMAGE:-kindest/node:v1.31.12}" --config=-
            kind: Cluster
            apiVersion: kind.x-k8s.io/v1alpha4
            containerdConfigPatches:
              - |-
                [plugins."io.containerd.grpc.v1.cri".containerd]
                  snapshotter = "native"
            nodes:
              - role: control-plane
                kubeadmConfigPatches:
                  - |
                    kind: InitConfiguration
                    nodeRegistration:
                      kubeletExtraArgs:
                        node-labels: "ingress-ready=true"
                extraPortMappings:
                  - containerPort: 80
                    hostPort: 80
                    protocol: TCP
                  - containerPort: 443
                    hostPort: 443
                    protocol: TCP
            EOF
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
            kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=6m
            kubectl get nodes -o wide

jobs:

  check-code:
    executor: golang-executor
    steps:
      - checkout
      - run: make tools
      - run: make linter

  run-unit-tests:
    executor: x86-docker-executor
    steps:
      - checkout
      - setup-docker
      - run: make run-unit-tests
    environment:
      GOIMAGE: << pipeline.parameters.goImage >>

  download-demo-data:
    executor: golang-executor
    steps:
      - checkout
      - run: mkdir -p /home/circleci/resources
      - run:
          name: Download itzpapalotl demo foxx service
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping download..."
              exit 0
            fi
            if ! [ -f "/home/circleci/resources/itzpapalotl-v1.2.0.zip" ]; then
              curl -L0 -o /home/circleci/resources/itzpapalotl-v1.2.0.zip \
                "https://github.com/arangodb-foxx/demo-itzpapalotl/archive/v1.2.0.zip"
            fi
      - persist_to_workspace:
          root: /home/circleci
          paths:
            - resources


  # ----------------------------------------
  # UNIFIED INTEGRATION TEST JOB X86
  # ----------------------------------------
  run-integration-tests:
    executor: x86-docker-executor
    parameters:
      test-to-run:
        type: string
      arangodb-image:
        type: string
      enable-extra-db-features:
        type: boolean
        default: false
      needs_foxx_workspace:
        type: boolean
        default: true
        description: "v1/v2 Foxx tests need itzpapalotl zip from download-demo-data workspace; v3+ does not."
    steps:
      - checkout
      - setup-docker
      - when:
          condition:
            equal: [ true, << parameters.needs_foxx_workspace >> ]
          steps:
            # download-demo-data persists root /home/circleci, paths: [resources] — attach at /home/circleci
            # so the zip is at /home/circleci/resources/... (matches TEST_RESOURCES), not .../resources/resources/...
            - attach_workspace:
                at: /home/circleci
            - run:
                name: Ensure resources directory exists
                command: mkdir -p /home/circleci/resources
      - run:
          name: Configure Foxx demo resources mount for Dockerized tests
          command: |
            if [ "<< parameters.needs_foxx_workspace >>" = "true" ]; then
              echo 'export TEST_RESOURCES=/home/circleci/resources/' >> "$BASH_ENV"
            fi
      - run-test-if-pr:
          test-command: make << parameters.test-to-run >>
    environment:
      <<: *integration_test_env_core
      ARANGODB: << parameters.arangodb-image >>

  # ----------------------------------------
  # ARM INTEGRATION TEST JOB
  # ----------------------------------------
  run-integration-tests-arm:
    executor: arm-docker-executor
    parameters:
      test-to-run:
        type: string
      arangodb-image:
        type: string
      enable-extra-db-features:
        type: boolean
        default: false
      needs_foxx_workspace:
        type: boolean
        default: true
        description: "v1/v2 Foxx tests need itzpapalotl zip from download-demo-data workspace; v3+ does not."
    steps:
      - checkout
      - setup-docker
      - when:
          condition:
            equal: [ true, << parameters.needs_foxx_workspace >> ]
          steps:
            # download-demo-data persists root /home/circleci, paths: [resources] — attach at /home/circleci
            # so the zip is at /home/circleci/resources/... (matches TEST_RESOURCES), not .../resources/resources/...
            - attach_workspace:
                at: /home/circleci
            - run:
                name: Ensure resources directory exists
                command: mkdir -p /home/circleci/resources
      - run:
          name: Configure Foxx demo resources mount for Dockerized tests
          command: |
            if [ "<< parameters.needs_foxx_workspace >>" = "true" ]; then
              echo 'export TEST_RESOURCES=/home/circleci/resources/' >> "$BASH_ENV"
            fi
      - run:
          name: Set platform-specific environment variables
          command: |
            echo 'export DOCKER_PLATFORM="--platform linux/arm64"' >> $BASH_ENV
            echo 'export DOCKER_BUILD_PLATFORM="--platform linux/arm64"' >> $BASH_ENV
      - run-test-if-pr:
          test-command: make << parameters.test-to-run >>
    environment:
      <<: *integration_test_env_core
      ARANGODB: << parameters.arangodb-image >>

  # ----------------------------------------
  # KUBERNETES INTEGRATION TEST JOB
  # ----------------------------------------
  run-k8s-integration-tests:
    executor: x86-docker-executor
    parameters:
      test-to-run:
        type: string
      arangodb-image:
        type: string
      enable-extra-db-features:
        type: boolean
        default: false
      needs_foxx_workspace:
        type: boolean
        default: true
        description: "v2 Foxx tests need itzpapalotl zip from download-demo-data workspace; v3+ does not."
      k8s-test-authentication:
        type: string
        default: "basic"
        description: "Driver auth mode used by the Kubernetes runner. Current K8s jobs use basic or none; jwt is supported by the runner."
      k8s-tls:
        type: boolean
        default: false
        description: "Enable TLS in the Kubernetes ArangoDeployment."
    steps:
      - checkout
      - setup-docker
      - when:
          condition:
            equal: [ true, << parameters.needs_foxx_workspace >> ]
          steps:
            - attach_workspace:
                at: /home/circleci
            - run:
                name: Ensure resources directory exists
                command: mkdir -p $HOME/resources
      - run:
          name: Configure Foxx demo resources mount for Dockerized tests
          command: |
            if [ "<< parameters.needs_foxx_workspace >>" = "true" ]; then
              echo 'export TEST_RESOURCES=/home/circleci/resources/' >> "$BASH_ENV"
            fi
      - install-kubernetes-tools
      - start-kind
      - run-test-if-pr:
          test-command: make << parameters.test-to-run >>
    environment:
      <<: *integration_test_env_core
      ARANGODB: << parameters.arangodb-image >>
      K8S_TEST_AUTHENTICATION: << parameters.k8s-test-authentication >>
      K8S_TLS: "<< parameters.k8s-tls >>"
      K8S_INGRESS_ADDRESS: "127.0.0.1"
      K8S_WAIT_TIMEOUT: 25m

  vulncheck:
    executor: golang-executor
    steps:
      - checkout
      - run: make tools
      - run: make vulncheck
      - *notify_slack_on_fail

  # GitHub release (tags VERSION bump, git push, github-release draft → publish).
  # Requires CircleCI context: GITHUB_TOKEN or RELEASER_GITHUB_TOKEN (repo contents write). Optional: GIT_USER_NAME, GIT_USER_EMAIL.
  # Pipeline parameter `publish` must be the exact Make target (see publish-release workflow regex).
  publish-github-release:
    executor: golang-executor
    steps:
      - checkout
      - run:
          name: Verify branch and repository
          command: |
            set -euo pipefail
            if [ "${CIRCLE_BRANCH:-}" != "master" ]; then
              echo "Releases are only allowed from master (got: ${CIRCLE_BRANCH:-})"
              exit 1
            fi
            if [ "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}" != "arangodb/go-driver" ]; then
              echo "Releases are only allowed on arangodb/go-driver"
              exit 1
            fi
      - run:
          name: Configure git and remote for push
          command: |
            set -euo pipefail
            if [ -n "${RELEASER_GITHUB_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ]; then
              export GITHUB_TOKEN="${RELEASER_GITHUB_TOKEN}"
            fi
            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN or RELEASER_GITHUB_TOKEN is not set. Add one via a CircleCI context (e.g. github-release)."
              exit 1
            fi
            git config --global user.email "${GIT_USER_EMAIL:-circleci-go-driver@arangodb.com}"
            git config --global user.name "${GIT_USER_NAME:-CircleCI Go Driver}"
            git config --global safe.directory "$(pwd)"
            git config --global push.autoSetupRemote true
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
      - run:
          name: Install release tooling
          command: make tools
      - run:
          name: Run release (make target from pipeline parameter publish)
          command: |
            set -euo pipefail
            if [ -n "${RELEASER_GITHUB_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ]; then
              export GITHUB_TOKEN="${RELEASER_GITHUB_TOKEN}"
            fi
            TARGET="<< pipeline.parameters.publish >>"
            case "$TARGET" in
              release-patch|release-minor|release-major|release-v2-patch|release-v2-minor|release-v2-major|release-v3-patch|release-v3-minor|release-v3-major|prerelease-patch|prerelease-minor|prerelease-major|prerelease-v2-patch|prerelease-v2-minor|prerelease-v2-major|prerelease-v3-patch|prerelease-v3-minor|prerelease-v3-major) ;;
              *) echo "Invalid publish target: '$TARGET'"; exit 1 ;;
            esac
            make "$TARGET"
      - *notify_slack_on_fail

workflows:
  version: 2

  # Default workflow (skipped only for release publishing on master).
  run_tests:
    when:
      not:
        and:
          - equal: [ master, << pipeline.git.branch >> ]
          - matches:
              value: << pipeline.parameters.publish >>
              pattern: *publish_release_target_regex
    jobs:
      - check-code
      - run-unit-tests:
          requires:
            - check-code
      - download-demo-data:
          requires:
            - run-unit-tests

      # ========================
      # V1 Tests x86
      # ========================
      - run-integration-tests:
          name: Test V1 cluster
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-tests-cluster
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>

      - run-integration-tests:
          name: Test V1 single
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-tests-single
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>

      # ========================
      # V2 Tests x86
      # ========================
      - run-integration-tests:
          name: Test V2 cluster
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-v2-tests-cluster
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>

      - run-integration-tests:
          name: Test V2 cluster - DB extra features (compression)
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-v2-tests-cluster
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>
          enable-extra-db-features: true

      - run-integration-tests:
          name: Test V2 single
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-v2-tests-single
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>

      # ========================
      # V2 Tests ARM
      # ========================
      - run-integration-tests-arm:
          name: Test V2 cluster (ARM)
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-v2-tests-cluster
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>

      # - run-integration-tests-arm:
      #     name: Test V2 cluster - DB extra features (compression) (ARM)
      #     requires:
      #       - download-demo-data
      #     test-to-run: run-v2-tests-cluster
      #     enable-extra-db-features: true

      - run-integration-tests-arm:
          name: Test V2 single (ARM)
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-v2-tests-single
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>

      # ========================
      # V3 Tests x86 (no Foxx / itzpapalotl; do not depend on download-demo-data)
      # ========================
      - run-integration-tests:
          name: Test V3 cluster
          context:
            - docker-hub
          requires:
            - run-unit-tests
          needs_foxx_workspace: false
          test-to-run: run-v3-tests-cluster
          arangodb-image: << pipeline.parameters.arangodbImageV3 >>

      - run-integration-tests:
          name: Test V3 cluster - DB extra features (compression)
          context:
            - docker-hub
          requires:
            - run-unit-tests
          needs_foxx_workspace: false
          test-to-run: run-v3-tests-cluster
          arangodb-image: << pipeline.parameters.arangodbImageV3 >>
          enable-extra-db-features: true

      - run-integration-tests:
          name: Test V3 single
          context:
            - docker-hub
          requires:
            - run-unit-tests
          needs_foxx_workspace: false
          test-to-run: run-v3-tests-single
          arangodb-image: << pipeline.parameters.arangodbImageV3 >>

      # ========================
      # Kubernetes Tests x86
      # ========================
      - run-k8s-integration-tests:
          name: Test V2 single on Kubernetes
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-k8s-v2-single
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>

      - run-k8s-integration-tests:
          name: Test V2 cluster on Kubernetes
          context:
            - docker-hub
          requires:
            - download-demo-data
          test-to-run: run-k8s-v2-cluster
          arangodb-image: << pipeline.parameters.arangodbImageV2 >>

      # ========================
      # V3 Tests ARM (no Foxx workspace)
      # ========================
      - run-integration-tests-arm:
          name: Test V3 cluster (ARM)
          context:
            - docker-hub
          requires:
            - run-unit-tests
          needs_foxx_workspace: false
          test-to-run: run-v3-tests-cluster
          arangodb-image: << pipeline.parameters.arangodbImageV3 >>

      - run-integration-tests-arm:
          name: Test V3 single (ARM)
          context:
            - docker-hub
          requires:
            - run-unit-tests
          needs_foxx_workspace: false
          test-to-run: run-v3-tests-single
          arangodb-image: << pipeline.parameters.arangodbImageV3 >>

  # Weekly vulnerability check
  weekly_vulncheck:
    jobs:
      - vulncheck:
          context:
            - slack
    triggers:
      - schedule:
          # 6:00 on every Monday
          cron: 0 6 * * 1
          filters:
            branches:
              only: master

  # Manual / API: trigger pipeline on master; set publish to a Make target (e.g. release-v2-patch, prerelease-v2-minor).
  # Same idea as arangodb-helper/arangodb publish-release-starter workflow.
  # Context: GITHUB_TOKEN or RELEASER_GITHUB_TOKEN (Fine-grained or classic PAT with contents:write).
  publish-release:
    when:
      and:
        - matches:
            value: << pipeline.parameters.publish >>
            pattern: *publish_release_target_regex
        - equal: [ master, << pipeline.git.branch >> ]
    jobs:
      - publish-github-release:
          context:
            - github-release
            - slack